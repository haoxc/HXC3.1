  <path d="M1080 626 V674" stroke="#596579" stroke-width="2.2" fill="none" marker-end="url(#arrowhead)" />

  <rect x="40" y="790" width="1200" height="48" rx="8" fill="#eefaf4" stroke="#65a30d" stroke-width="1.3" />
  <text x="64" y="819" fill="#365314" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">关键原则：</text>
  <text x="154" y="819" fill="#365314" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">规则未定义不强判；概念边界不清先对齐；MOC 只做导航，不承载正文、进度或决策记录。</text>

  <rect x="40" y="858" width="1200" height="44" rx="8" fill="#172033" stroke="#172033" stroke-width="1" />
  <text x="64" y="886" fill="#ffffff" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">压缩记忆：</text>
  <text x="154" y="886" fill="#e5edf5" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15">识别类型 -> 加载规则 -> 构建结构图 -> 分流审计 -> P级发现 -> 路径化整改 -> 重跑验证。</text>
</svg>
