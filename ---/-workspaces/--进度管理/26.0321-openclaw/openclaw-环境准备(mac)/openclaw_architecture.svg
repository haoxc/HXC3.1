<svg width="100%" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    svg { font-family: sans-serif; }
    .th { font-size: 13px; font-weight: 600; }
    .ts { font-size: 11px; font-weight: 400; }
    .arr { stroke: #AAAAAA; stroke-width: 1.5; fill: none; }

    /* 层标签 */
    .layer-label { font-size: 11px; fill: #AAAAAA; }

    /* 接入层 / 存储层 — 浅灰底 */
    .bg-subtle { fill: #F6F5F0; stroke: #D3D1C7; }

    /* c-blue — 接入渠道 */
    .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th   { fill: #0C447C; }
    .c-blue .ts   { fill: #185FA5; }

    /* c-purple — 网关层 */
    .c-purple rect  { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th   { fill: #3C3489; }
    .c-purple .ts   { fill: #534AB7; }

    /* c-teal — 执行层 */
    .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th   { fill: #085041; }
    .c-teal .ts   { fill: #0F6E56; }

    /* c-amber — 智能层 */
    .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th   { fill: #633806; }
    .c-amber .ts   { fill: #854F0B; }

    /* c-gray — 存储子节点 */
    .c-gray rect  { fill: #F1EFE8; stroke: #888780; }
    .c-gray .th   { fill: #2C2C2A; }
    .c-gray .ts   { fill: #5F5E5A; }
  </style>
</defs>

<!-- 层标签（左侧竖排） -->
<text class="layer-label" x="13" y="72"  text-anchor="middle" transform="rotate(-90,13,72)" >接入层</text>
<text class="layer-label" x="13" y="198" text-anchor="middle" transform="rotate(-90,13,198)">网关层</text>
<text class="layer-label" x="13" y="358" text-anchor="middle" transform="rotate(-90,13,358)">执行层</text>
<text class="layer-label" x="13" y="534" text-anchor="middle" transform="rotate(-90,13,534)">智能层</text>
<text class="layer-label" x="13" y="680" text-anchor="middle" transform="rotate(-90,13,680)">存储层</text>

