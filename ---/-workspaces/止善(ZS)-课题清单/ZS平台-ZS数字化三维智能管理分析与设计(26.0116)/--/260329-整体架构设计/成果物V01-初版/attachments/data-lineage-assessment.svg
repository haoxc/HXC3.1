<svg width="720" height="480" viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <style>
    .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #333; }
    .box-desc { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .check { fill: #1D9E75; }
    .cross { fill: #D85A30; }
  </style>
  
  <text x="360" y="28" text-anchor="middle" class="title">数据血缘专题评估</text>
  
  <!-- 应用场景 -->
  <text x="40" y="58" class="subtitle">核心应用场景</text>
  
  <rect x="40" y="68" width="155" height="70" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="118" y="93" text-anchor="middle" class="box-title">影响分析</text>
  <text x="118" y="113" text-anchor="middle" class="box-desc">修改A会影响哪些</text>
  <text x="118" y="128" text-anchor="middle" class="box-desc">下游孪生体？</text>
  
  <rect x="215" y="68" width="155" height="70" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="293" y="93" text-anchor="middle" class="box-title">溯源追踪</text>
  <text x="293" y="113" text-anchor="middle" class="box-desc">这个告警数据</text>
  <text x="293" y="128" text-anchor="middle" class="box-desc">从哪里来的？</text>
  
  <rect x="390" y="68" width="155" height="70" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="468" y="93" text-anchor="middle" class="box-title">接口依赖</text>
  <text x="468" y="113" text-anchor="middle" class="box-desc">哪些孪生体依赖</text>
  <text x="468" y="128" text-anchor="middle" class="box-desc">这个API接口？</text>
  
  <rect x="565" y="68" width="115" height="70" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="623" y="93" text-anchor="middle" class="box-title">变更审计</text>
  <text x="623" y="113" text-anchor="middle" class="box-desc">数据变更的</text>
  <text x="623" y="128" text-anchor="middle" class="box-desc">完整链路</text>
  
  <!-- 方案对比 -->
  <text x="40" y="170" class="subtitle">技术方案对比</text>
  
  <!-- 方案A -->
  <rect x="40" y="180" width="210" height="150" rx="8" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="145" y="203" text-anchor="middle" class="box-title">方案A: PostgreSQL</text>
  <line x1="50" y1="213" x2="240" y2="213" stroke="#2E75B6" stroke-width="0.5"/>
  <text x="55" y="233" class="box-desc check">✓ 无新增组件</text>
  <text x="55" y="253" class="box-desc check">✓ 事务一致性好</text>
  <text x="55" y="273" class="box-desc check">✓ 团队熟悉</text>
  <text x="55" y="293" class="box-desc cross">✗ 多跳查询性能差</text>
  <text x="55" y="313" class="box-desc cross">✗ 关系建模不直观</text>
  
  <!-- 方案B -->
  <rect x="270" y="180" width="210" height="150" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="375" y="203" text-anchor="middle" class="box-title">方案B: Neo4j</text>
  <line x1="280" y1="213" x2="470" y2="213" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="285" y="233" class="box-desc check">✓ 图查询性能优异</text>
  <text x="285" y="253" class="box-desc check">✓ 关系建模自然</text>
  <text x="285" y="273" class="box-desc check">✓ 可视化能力强</text>
  <text x="285" y="293" class="box-desc cross">✗ 新增运维成本</text>
  <text x="285" y="313" class="box-desc cross">✗ 数据同步复杂</text>
  
  <!-- 方案C -->
  <rect x="500" y="180" width="180" height="150" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="590" y="203" text-anchor="middle" class="box-title">方案C: Apache Atlas</text>
  <line x1="510" y1="213" x2="670" y2="213" stroke="#D85A30" stroke-width="0.5"/>
  <text x="515" y="233" class="box-desc check">✓ 企业级血缘方案</text>
  <text x="515" y="253" class="box-desc check">✓ 元数据管理完整</text>
  <text x="515" y="273" class="box-desc check">✓ 大数据生态兼容</text>
  <text x="515" y="293" class="box-desc cross">✗ 架构复杂(Kafka等)</text>
  <text x="515" y="313" class="box-desc cross">✗ 过度设计风险</text>
  
  <!-- 推荐方案 -->
  <text x="40" y="365" class="subtitle">推荐方案：分阶段演进</text>
  
  <rect x="40" y="375" width="195" height="65" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1.5"/>
  <text x="138" y="398" text-anchor="middle" class="box-title">Phase 1: PostgreSQL</text>
  <text x="138" y="418" text-anchor="middle" class="box-desc">邻接表 + WITH RECURSIVE</text>
  <text x="138" y="433" text-anchor="middle" class="box-desc">满足3跳以内查询</text>
  
  <line x1="235" y1="408" x2="270" y2="408" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="275" y="375" width="195" height="65" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="373" y="398" text-anchor="middle" class="box-title">Phase 2: 评估扩展</text>
  <text x="373" y="418" text-anchor="middle" class="box-desc">AGE扩展(PG图能力)</text>
  <text x="373" y="433" text-anchor="middle" class="box-desc">或独立Neo4j</text>
  
  <line x1="470" y1="408" x2="505" y2="408" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="510" y="375" width="170" height="65" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="595" y="398" text-anchor="middle" class="box-title">Phase 3: 全链路</text>
  <text x="595" y="418" text-anchor="middle" class="box-desc">跨系统血缘</text>
  <text x="595" y="433" text-anchor="middle" class="box-desc">Apache Atlas</text>
  
  <!-- 数据模型 -->
  <text x="40" y="468" class="subtitle">Phase 1 数据模型: data_lineage(source_type, source_id, target_type, target_id, relation, transform_rule)</text>
</svg>
