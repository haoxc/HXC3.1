<svg width="720" height="480" viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <style>
    .title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .box-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #333; }
    .box-desc { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
  </style>
  
  <!-- 图元管理 -->
  <text x="185" y="25" text-anchor="middle" class="title">图元管理</text>
  
  <rect x="40" y="40" width="290" height="180" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="55" y="62" class="subtitle">图元仓库</text>
  
  <rect x="55" y="75" width="125" height="55" rx="6" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="118" y="98" text-anchor="middle" class="box-title">2D图标</text>
  <text x="118" y="115" text-anchor="middle" class="box-desc">SVG/PNG</text>
  
  <rect x="195" y="75" width="120" height="55" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="255" y="98" text-anchor="middle" class="box-title">3D模型</text>
  <text x="255" y="115" text-anchor="middle" class="box-desc">glTF/OBJ</text>
  
  <rect x="55" y="145" width="125" height="55" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="118" y="168" text-anchor="middle" class="box-title">动画效果</text>
  <text x="118" y="185" text-anchor="middle" class="box-desc">Lottie/Spine</text>
  
  <rect x="195" y="145" width="120" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="255" y="168" text-anchor="middle" class="box-title">LOD层级</text>
  <text x="255" y="185" text-anchor="middle" class="box-desc">高/中/低精度</text>
  
  <!-- 模板引擎 -->
  <text x="535" y="25" text-anchor="middle" class="title">模板渲染引擎 (Amis)</text>
  
  <rect x="390" y="40" width="290" height="180" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="405" y="62" class="subtitle">模板系统</text>
  
  <rect x="405" y="75" width="125" height="55" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="468" y="98" text-anchor="middle" class="box-title">模板设计器</text>
  <text x="468" y="115" text-anchor="middle" class="box-desc">可视化拖拽</text>
  
  <rect x="540" y="75" width="125" height="55" rx="6" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="603" y="98" text-anchor="middle" class="box-title">组件库</text>
  <text x="603" y="115" text-anchor="middle" class="box-desc">图表/表格/卡片</text>
  
  <rect x="405" y="145" width="125" height="55" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="468" y="168" text-anchor="middle" class="box-title">数据绑定</text>
  <text x="468" y="185" text-anchor="middle" class="box-desc">字段映射规则</text>
  
  <rect x="540" y="145" width="125" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="603" y="168" text-anchor="middle" class="box-title">样式主题</text>
  <text x="603" y="185" text-anchor="middle" class="box-desc">换肤/告警态</text>
  
  <!-- 绑定连线 -->
  <line x1="330" y1="130" x2="388" y2="130" stroke="#7F77DD" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="359" y="122" text-anchor="middle" class="box-desc">绑定</text>
  
  <!-- 三层解耦 -->
  <text x="360" y="255" text-anchor="middle" class="title">数据-逻辑-展示 三层解耦</text>
  
  <rect x="40" y="275" width="200" height="80" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="140" y="302" text-anchor="middle" class="box-title">数据层</text>
  <text x="140" y="320" text-anchor="middle" class="box-desc">孪生体属性数据</text>
  <text x="140" y="336" text-anchor="middle" class="box-desc">IoT实时数据</text>
  
  <line x1="240" y1="315" x2="270" y2="315" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="275" y="275" width="170" height="80" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="360" y="302" text-anchor="middle" class="box-title">逻辑层</text>
  <text x="360" y="320" text-anchor="middle" class="box-desc">数据转换规则</text>
  <text x="360" y="336" text-anchor="middle" class="box-desc">条件渲染逻辑</text>
  
  <line x1="445" y1="315" x2="475" y2="315" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="480" y="275" width="200" height="80" rx="8" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="580" y="302" text-anchor="middle" class="box-title">展示层</text>
  <text x="580" y="320" text-anchor="middle" class="box-desc">页面模板</text>
  <text x="580" y="336" text-anchor="middle" class="box-desc">样式/布局/交互</text>
  
  <!-- 动态模板切换 -->
  <text x="40" y="390" class="subtitle">动态模板切换机制</text>
  
  <rect x="40" y="400" width="100" height="40" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="90" y="425" text-anchor="middle" class="box-desc">孪生体类型</text>
  
  <line x1="140" y1="420" x2="165" y2="420" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  
  <rect x="170" y="400" width="110" height="40" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="225" y="425" text-anchor="middle" class="box-desc">模板匹配规则</text>
  
  <line x1="280" y1="420" x2="305" y2="420" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  
  <rect x="310" y="400" width="90" height="40" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="355" y="425" text-anchor="middle" class="box-desc">设备详情页</text>
  
  <rect x="420" y="400" width="90" height="40" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="465" y="425" text-anchor="middle" class="box-desc">告警面板</text>
  
  <rect x="530" y="400" width="90" height="40" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="575" y="425" text-anchor="middle" class="box-desc">运维工单</text>
  
  <text x="645" y="425" class="subtitle">...</text>
  
  <!-- 底部说明 -->
  <text x="40" y="465" class="subtitle">图元绑定: twin_type → visual_element_id → lod_level → state_styles</text>
</svg>
