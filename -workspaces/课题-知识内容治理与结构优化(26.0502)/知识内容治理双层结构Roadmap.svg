<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1080" viewBox="0 0 1200 1080" style="max-width: 100%; height: auto;">
  <title>知识内容治理双层结构 Roadmap</title>
  <desc>展示知识内容治理方案的底层路基、双层架构、转层判定和实施路线。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#596579" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2f7d5f" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="1080" fill="#f7f8fb" />

  <text x="60" y="58" fill="#202a37" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700">知识内容治理双层结构 Roadmap</text>
  <text x="60" y="90" fill="#596579" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16">课题层保留过程与证据，知识层沉淀稳定结论；转层不是搬文件，而是提炼可复用知识。</text>

  <!-- Layer 1 -->
  <rect x="50" y="125" width="1100" height="170" rx="8" fill="#ffffff" stroke="#d8dee8" stroke-width="1.5" />
  <rect x="50" y="125" width="14" height="170" rx="7" fill="#2f7d5f" />
  <text x="82" y="160" fill="#202a37" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700">01 底层路基</text>
  <text x="82" y="186" fill="#596579" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">先确定知识治理原则，再决定目录和文件移动。</text>

  <rect x="85" y="210" width="190" height="58" rx="8" fill="#eef8f3" stroke="#9fd1bd" stroke-width="1.2" />
  <text x="105" y="235" fill="#23483a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">检索速度优先</text>
  <text x="105" y="257" fill="#49695d" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">标题与 MOC 先服务查找</text>

  <rect x="300" y="210" width="190" height="58" rx="8" fill="#eef8f3" stroke="#9fd1bd" stroke-width="1.2" />
  <text x="320" y="235" fill="#23483a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">一棵树一张嘴</text>
  <text x="320" y="257" fill="#49695d" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">一个概念一个主解释页</text>

  <rect x="515" y="210" width="190" height="58" rx="8" fill="#eef8f3" stroke="#9fd1bd" stroke-width="1.2" />
  <text x="535" y="235" fill="#23483a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">MOC 是地图</text>
  <text x="535" y="257" fill="#49695d" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">索引结构，不塞正文</text>

  <rect x="730" y="210" width="190" height="58" rx="8" fill="#eef8f3" stroke="#9fd1bd" stroke-width="1.2" />
  <text x="750" y="235" fill="#23483a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">证据留在课题层</text>
  <text x="750" y="257" fill="#49695d" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">来源、争议、过程可追溯</text>

  <rect x="945" y="210" width="170" height="58" rx="8" fill="#eef8f3" stroke="#9fd1bd" stroke-width="1.2" />
  <text x="965" y="235" fill="#23483a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">结论进入知识层</text>
  <text x="965" y="257" fill="#49695d" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">稳定、泛化、可复用</text>

  <!-- Layer 2 -->
  <rect x="50" y="325" width="1100" height="250" rx="8" fill="#ffffff" stroke="#d8dee8" stroke-width="1.5" />
  <rect x="50" y="325" width="14" height="250" rx="7" fill="#3d6f9f" />
  <text x="82" y="360" fill="#202a37" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700">02 双层架构</text>
  <text x="82" y="386" fill="#596579" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">领域层用 HXC Vault 做长期沉淀，课题层吸收 Karpathy / llm-wiki 做深度编译。</text>

  <rect x="90" y="415" width="430" height="120" rx="8" fill="#f0f6fc" stroke="#9dbad6" stroke-width="1.4" />
  <text x="115" y="445" fill="#254766" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700">课题编译层</text>
  <text x="115" y="470" fill="#4b6074" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">位置：---/-workspaces/课题</text>
  <text x="115" y="496" fill="#4b6074" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">保存：raw / entities / concepts / comparisons / queries / log</text>
  <text x="115" y="522" fill="#4b6074" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">职责：材料、过程、证据、争议、阶段性判断</text>

  <rect x="680" y="415" width="430" height="120" rx="8" fill="#f5f7ef" stroke="#c7d49a" stroke-width="1.4" />
  <text x="705" y="445" fill="#4e5d21" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700">领域沉淀层</text>
  <text x="705" y="470" fill="#68724d" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">位置：03-领域/50-管理学科</text>
  <text x="705" y="496" fill="#68724d" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">保存：MOC / 术语 / 方法工具 / 知识体系</text>
  <text x="705" y="522" fill="#68724d" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">职责：稳定概念、模型、原则、方法、可复用结论</text>

  <path d="M530 475 H665" stroke="#596579" stroke-width="2.4" fill="none" marker-end="url(#arrow)" />
  <rect x="545" y="438" width="105" height="46" rx="8" fill="#fff7e8" stroke="#e3b45b" stroke-width="1.2" />
  <text x="563" y="458" fill="#7a5520" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700">转层闸口</text>
  <text x="558" y="477" fill="#7a5520" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12">8-10 分进入</text>

  <!-- Layer 3 -->
  <rect x="50" y="605" width="1100" height="205" rx="8" fill="#ffffff" stroke="#d8dee8" stroke-width="1.5" />
  <rect x="50" y="605" width="14" height="205" rx="7" fill="#c58a2c" />
  <text x="82" y="640" fill="#202a37" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700">03 转层判定</text>
  <text x="82" y="666" fill="#596579" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">用五项条件判断“是否提炼”，避免凭感觉搬文件。</text>

  <rect x="90" y="690" width="175" height="62" rx="8" fill="#fff7e8" stroke="#e3b45b" stroke-width="1.2" />
  <text x="115" y="716" fill="#704c1a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">稳定性</text>
  <text x="115" y="738" fill="#83684a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">结论不再反复变化</text>

  <rect x="285" y="690" width="175" height="62" rx="8" fill="#fff7e8" stroke="#e3b45b" stroke-width="1.2" />
  <text x="310" y="716" fill="#704c1a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">泛化性</text>
  <text x="310" y="738" fill="#83684a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">能解释一类问题</text>

  <rect x="480" y="690" width="175" height="62" rx="8" fill="#fff7e8" stroke="#e3b45b" stroke-width="1.2" />
  <text x="505" y="716" fill="#704c1a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">可复用性</text>
  <text x="505" y="738" fill="#83684a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">未来会被反复引用</text>

  <rect x="675" y="690" width="175" height="62" rx="8" fill="#fff7e8" stroke="#e3b45b" stroke-width="1.2" />
  <text x="700" y="716" fill="#704c1a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">证据充分性</text>
  <text x="700" y="738" fill="#83684a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">有来源、案例或推理链</text>

  <rect x="870" y="690" width="195" height="62" rx="8" fill="#fff7e8" stroke="#e3b45b" stroke-width="1.2" />
  <text x="895" y="716" fill="#704c1a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">归口清晰</text>
  <text x="895" y="738" fill="#83684a" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">canonical 页面明确</text>

  <text x="102" y="785" fill="#596579" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">评分：0-4 留课题层；5-7 只做 MOC 索引；8-10 提炼或合并进入知识层。</text>

  <!-- Layer 4 -->
  <rect x="50" y="840" width="1100" height="185" rx="8" fill="#ffffff" stroke="#d8dee8" stroke-width="1.5" />
  <rect x="50" y="840" width="14" height="185" rx="7" fill="#6f5a9c" />
  <text x="82" y="875" fill="#202a37" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700">04 实施路线</text>
  <text x="82" y="901" fill="#596579" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14">先修导航和边界，再迁移深度课题，最后建立复盘闭环。</text>

  <rect x="85" y="928" width="145" height="62" rx="8" fill="#f4f1fa" stroke="#c1b6dc" stroke-width="1.2" />
  <text x="105" y="953" fill="#4d3e70" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700">P1 重建入口</text>
  <text x="105" y="975" fill="#675d82" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12">50-管理学科 MOC</text>

  <rect x="255" y="928" width="145" height="62" rx="8" fill="#f4f1fa" stroke="#c1b6dc" stroke-width="1.2" />
  <text x="275" y="953" fill="#4d3e70" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700">P2 概念归口</text>
  <text x="275" y="975" fill="#675d82" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12">指定 canonical 页</text>

  <rect x="425" y="928" width="145" height="62" rx="8" fill="#f4f1fa" stroke="#c1b6dc" stroke-width="1.2" />
  <text x="445" y="953" fill="#4d3e70" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700">P3 课题筛选</text>
  <text x="445" y="975" fill="#675d82" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12">识别深度编译对象</text>

  <rect x="595" y="928" width="145" height="62" rx="8" fill="#f4f1fa" stroke="#c1b6dc" stroke-width="1.2" />
  <text x="615" y="953" fill="#4d3e70" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700">P4 建编译层</text>
  <text x="615" y="975" fill="#675d82" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12">raw/entities/concepts</text>

  <rect x="765" y="928" width="145" height="62" rx="8" fill="#f4f1fa" stroke="#c1b6dc" stroke-width="1.2" />
  <text x="785" y="953" fill="#4d3e70" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700">P5 回流知识</text>
  <text x="785" y="975" fill="#675d82" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12">只转稳定结论</text>

  <rect x="935" y="928" width="145" height="62" rx="8" fill="#f4f1fa" stroke="#c1b6dc" stroke-width="1.2" />
  <text x="955" y="953" fill="#4d3e70" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700">P6 复盘治理</text>
  <text x="955" y="975" fill="#675d82" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12">问题台账与标准迭代</text>

  <path d="M230 959 H250" stroke="#596579" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M400 959 H420" stroke="#596579" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M570 959 H590" stroke="#596579" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M740 959 H760" stroke="#596579" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M910 959 H930" stroke="#596579" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <rect x="50" y="1040" width="1100" height="1" fill="#d8dee8" />
  <text x="60" y="1065" fill="#596579" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">一句话：课题层负责把复杂问题编译清楚，知识层负责把稳定结论长期复用。</text>
</svg>
