<svg width="800" height="750" viewBox="0 0 800 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <style>
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
    .layer-title { font-family: Arial, sans-serif; font-size: 11px; fill: #888; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #333; }
    .box-desc { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
  </style>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" class="title">数字孪生数据中台架构</text>
  
  <!-- 外部消费层 -->
  <text x="60" y="60" class="layer-title">外部消费层</text>
  <rect x="60" y="70" width="140" height="45" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="130" y="97" text-anchor="middle" class="box-title">3D渲染引擎</text>
  
  <rect x="220" y="70" width="140" height="45" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="290" y="97" text-anchor="middle" class="box-title">业务系统</text>
  
  <rect x="380" y="70" width="140" height="45" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="450" y="97" text-anchor="middle" class="box-title">移动端/大屏</text>
  
  <rect x="540" y="70" width="140" height="45" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="610" y="97" text-anchor="middle" class="box-title">第三方集成</text>
  
  <!-- 箭头 -->
  <line x1="370" y1="115" x2="370" y2="135" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 中台边界框 -->
  <rect x="50" y="145" width="700" height="520" rx="10" fill="none" stroke="#2E75B6" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="70" y="168" class="box-title" fill="#2E75B6">数字孪生数据中台</text>
  
  <!-- API网关层 -->
  <rect x="70" y="180" width="660" height="45" rx="8" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="400" y="208" text-anchor="middle" class="box-title">API网关 / 统一接口服务层</text>
  
  <!-- 核心服务层 -->
  <text x="70" y="250" class="layer-title">核心服务层</text>
  <rect x="70" y="260" width="155" height="60" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="148" y="285" text-anchor="middle" class="box-title">接口管理</text>
  <text x="148" y="302" text-anchor="middle" class="box-desc">注册/测试/联调</text>
  
  <rect x="240" y="260" width="155" height="60" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="318" y="285" text-anchor="middle" class="box-title">标识管理</text>
  <text x="318" y="302" text-anchor="middle" class="box-desc">KKS/IEC61850/Tags</text>
  
  <rect x="410" y="260" width="155" height="60" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="488" y="285" text-anchor="middle" class="box-title">图元管理</text>
  <text x="488" y="302" text-anchor="middle" class="box-desc">2D/3D/LOD</text>
  
  <rect x="580" y="260" width="150" height="60" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="655" y="285" text-anchor="middle" class="box-title">模板引擎</text>
  <text x="655" y="302" text-anchor="middle" class="box-desc">Amis页面渲染</text>
  
  <!-- 孪生体领域层 -->
  <text x="70" y="345" class="layer-title">孪生体领域层</text>
  <rect x="70" y="355" width="210" height="60" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="175" y="380" text-anchor="middle" class="box-title">孪生体模型</text>
  <text x="175" y="397" text-anchor="middle" class="box-desc">元数据/属性/关系/行为</text>
  
  <rect x="300" y="355" width="210" height="60" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="405" y="380" text-anchor="middle" class="box-title">空间拓扑</text>
  <text x="405" y="397" text-anchor="middle" class="box-desc">层级/位置/连接关系</text>
  
  <rect x="530" y="355" width="200" height="60" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="630" y="380" text-anchor="middle" class="box-title">生命周期</text>
  <text x="630" y="397" text-anchor="middle" class="box-desc">版本/状态/变更</text>
  
  <!-- 数据治理层 -->
  <text x="70" y="440" class="layer-title">数据治理层</text>
  <rect x="70" y="450" width="155" height="55" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="148" y="473" text-anchor="middle" class="box-title">数据质量</text>
  <text x="148" y="490" text-anchor="middle" class="box-desc">清洗/校验/修复</text>
  
  <rect x="240" y="450" width="155" height="55" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="318" y="473" text-anchor="middle" class="box-title">数据标准</text>
  <text x="318" y="490" text-anchor="middle" class="box-desc">编码/转换/映射</text>
  
  <rect x="410" y="450" width="155" height="55" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="488" y="473" text-anchor="middle" class="box-title">数据血缘</text>
  <text x="488" y="490" text-anchor="middle" class="box-desc">溯源/影响分析</text>
  
  <rect x="580" y="450" width="150" height="55" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="655" y="473" text-anchor="middle" class="box-title">数据审计</text>
  <text x="655" y="490" text-anchor="middle" class="box-desc">日志/追踪</text>
  
  <!-- 数据接入层 -->
  <text x="70" y="530" class="layer-title">数据接入层</text>
  <rect x="70" y="540" width="155" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="148" y="563" text-anchor="middle" class="box-title">IoT适配器</text>
  <text x="148" y="580" text-anchor="middle" class="box-desc">MQTT/OPC-UA</text>
  
  <rect x="240" y="540" width="155" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="318" y="563" text-anchor="middle" class="box-title">API适配器</text>
  <text x="318" y="580" text-anchor="middle" class="box-desc">REST/GraphQL</text>
  
  <rect x="410" y="540" width="155" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="488" y="563" text-anchor="middle" class="box-title">文件适配器</text>
  <text x="488" y="580" text-anchor="middle" class="box-desc">CSV/Excel/BIM</text>
  
  <rect x="580" y="540" width="150" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="655" y="563" text-anchor="middle" class="box-title">消息适配器</text>
  <text x="655" y="580" text-anchor="middle" class="box-desc">Kafka/RabbitMQ</text>
  
  <!-- 数据存储层 -->
  <text x="70" y="620" class="layer-title">数据存储层 (PostgreSQL)</text>
  <rect x="70" y="630" width="160" height="45" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="150" y="658" text-anchor="middle" class="box-title">关系数据</text>
  
  <rect x="245" y="630" width="175" height="45" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="333" y="658" text-anchor="middle" class="box-title">时序数据 (TimescaleDB)</text>
  
  <rect x="435" y="630" width="155" height="45" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="513" y="658" text-anchor="middle" class="box-title">空间数据 (PostGIS)</text>
  
  <rect x="605" y="630" width="125" height="45" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="668" y="658" text-anchor="middle" class="box-title">文件存储 (MinIO)</text>
  
  <!-- 侧边运维 -->
  <rect x="755" y="180" width="30" height="495" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="770" y="430" text-anchor="middle" transform="rotate(-90 770 430)" class="box-desc">运维管控：权限/监控/告警/配置</text>
  
  <!-- 底部数据源 -->
  <text x="400" y="720" text-anchor="middle" class="subtitle">数据源：IoT传感器 | SCADA | MES | ERP | BIM/GIS | 其他业务系统</text>
  <line x1="250" y1="695" x2="250" y2="680" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="695" x2="400" y2="680" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="695" x2="550" y2="680" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
