<svg width="750" height="420" viewBox="0 0 750 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <style>
    .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #333; }
    .box-desc { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .duration { font-family: Arial, sans-serif; font-size: 11px; fill: #888; }
  </style>
  
  <text x="375" y="28" text-anchor="middle" class="title">分阶段实施路线图</text>
  
  <!-- 阶段1 MVP -->
  <rect x="40" y="50" width="160" height="195" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <text x="120" y="75" text-anchor="middle" class="box-title">MVP阶段</text>
  <text x="120" y="93" text-anchor="middle" class="duration">8-10周</text>
  <line x1="50" y1="103" x2="190" y2="103" stroke="#D85A30" stroke-width="0.5"/>
  <text x="55" y="123" class="box-desc">• 孪生体核心模型</text>
  <text x="55" y="140" class="box-desc">• KKS/IEC61850基础</text>
  <text x="55" y="157" class="box-desc">• 接口注册/测试</text>
  <text x="55" y="174" class="box-desc">• 图元仓库CRUD</text>
  <text x="55" y="191" class="box-desc">• 基础权限控制</text>
  <text x="55" y="208" class="box-desc">• PostgreSQL+PostGIS</text>
  <text x="55" y="225" class="box-desc">• MinIO部署</text>
  
  <line x1="200" y1="145" x2="230" y2="145" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 阶段2 增强 -->
  <rect x="235" y="50" width="160" height="195" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="315" y="75" text-anchor="middle" class="box-title">增强阶段</text>
  <text x="315" y="93" text-anchor="middle" class="duration">6-8周</text>
  <line x1="245" y1="103" x2="385" y2="103" stroke="#BA7517" stroke-width="0.5"/>
  <text x="250" y="123" class="box-desc">• EMQX IoT适配</text>
  <text x="250" y="140" class="box-desc">• TimescaleDB时序</text>
  <text x="250" y="157" class="box-desc">• 数据质量规则</text>
  <text x="250" y="174" class="box-desc">• Amis模板绑定</text>
  <text x="250" y="191" class="box-desc">• 变更审计完善</text>
  <text x="250" y="208" class="box-desc">• 运行时监控</text>
  
  <line x1="395" y1="145" x2="425" y2="145" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 阶段3 深化 -->
  <rect x="430" y="50" width="160" height="195" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="510" y="75" text-anchor="middle" class="box-title">深化阶段</text>
  <text x="510" y="93" text-anchor="middle" class="duration">8-10周</text>
  <line x1="440" y1="103" x2="580" y2="103" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="445" y="123" class="box-desc">• 可视化模板设计</text>
  <text x="445" y="140" class="box-desc">• 数据血缘追溯</text>
  <text x="445" y="157" class="box-desc">• 链路追踪集成</text>
  <text x="445" y="174" class="box-desc">• 高级标签系统</text>
  <text x="445" y="191" class="box-desc">• LOD动态加载</text>
  <text x="445" y="208" class="box-desc">• 性能优化</text>
  
  <line x1="590" y1="145" x2="620" y2="145" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 阶段4 扩展 -->
  <rect x="625" y="50" width="100" height="195" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="675" y="75" text-anchor="middle" class="box-title">扩展</text>
  <text x="675" y="93" text-anchor="middle" class="duration">持续</text>
  <line x1="635" y1="103" x2="715" y2="103" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="638" y="123" class="box-desc">• 多租户</text>
  <text x="638" y="140" class="box-desc">• 插件机制</text>
  <text x="638" y="157" class="box-desc">• 事件总线</text>
  <text x="638" y="174" class="box-desc">• 大规模性能</text>
  <text x="638" y="191" class="box-desc">• AI增强</text>
  
  <!-- 关键里程碑 -->
  <text x="40" y="275" class="subtitle">关键里程碑</text>
  
  <rect x="40" y="285" width="155" height="40" rx="6" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="118" y="310" text-anchor="middle" class="box-desc">M1: 首个孪生体接入</text>
  
  <rect x="215" y="285" width="160" height="40" rx="6" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="295" y="310" text-anchor="middle" class="box-desc">M2: IoT实时数据打通</text>
  
  <rect x="395" y="285" width="160" height="40" rx="6" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="475" y="310" text-anchor="middle" class="box-desc">M3: 3D场景数据联动</text>
  
  <rect x="575" y="285" width="140" height="40" rx="6" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="645" y="310" text-anchor="middle" class="box-desc">M4: 平台化运营</text>
  
  <!-- 技术栈 -->
  <text x="40" y="355" class="subtitle">技术栈确认</text>
  <rect x="40" y="365" width="685" height="45" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="383" y="385" text-anchor="middle" class="box-desc">Java (Spring Boot) | PostgreSQL + TimescaleDB + PostGIS | Vue3 + Element Plus</text>
  <text x="383" y="402" text-anchor="middle" class="box-desc">EMQX | Amis | MinIO | Redis | Jaeger/SkyWalking</text>
</svg>
