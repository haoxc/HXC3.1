<svg width="750" height="580" viewBox="0 0 750 580" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
    .table-name { font-family: Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #333; }
    .field { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .pk { font-family: Arial, sans-serif; font-size: 11px; fill: #2E75B6; font-weight: 500; }
  </style>
  
  <text x="375" y="25" text-anchor="middle" class="title">孪生体核心数据模型 (PostgreSQL)</text>
  
  <!-- 核心实体 twin_entity -->
  <rect x="255" y="45" width="240" height="130" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="375" y="68" text-anchor="middle" class="table-name">twin_entity (孪生体)</text>
  <line x1="265" y1="78" x2="485" y2="78" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="270" y="95" class="pk">id: UUID (PK)</text>
  <text x="270" y="110" class="field">name: VARCHAR(200)</text>
  <text x="270" y="125" class="field">type_id: FK → twin_type</text>
  <text x="270" y="140" class="field">parent_id: FK → twin_entity</text>
  <text x="270" y="155" class="field">lifecycle_state: ENUM</text>
  <text x="270" y="170" class="field">status: ENUM</text>
  
  <!-- twin_type -->
  <rect x="40" y="200" width="180" height="100" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="130" y="220" text-anchor="middle" class="table-name">twin_type</text>
  <line x1="50" y1="230" x2="210" y2="230" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="55" y="248" class="pk">id: UUID (PK)</text>
  <text x="55" y="263" class="field">name: VARCHAR</text>
  <text x="55" y="278" class="field">schema_def: JSONB</text>
  <text x="55" y="293" class="field">parent_type_id: FK</text>
  
  <!-- twin_identity -->
  <rect x="285" y="200" width="180" height="100" rx="6" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="375" y="220" text-anchor="middle" class="table-name">twin_identity</text>
  <line x1="295" y1="230" x2="455" y2="230" stroke="#2E75B6" stroke-width="0.5"/>
  <text x="300" y="248" class="field">twin_id: FK</text>
  <text x="300" y="263" class="field">code_system: ENUM</text>
  <text x="300" y="278" class="field">code_value: VARCHAR</text>
  <text x="300" y="293" class="field">is_primary: BOOLEAN</text>
  
  <!-- twin_attribute -->
  <rect x="530" y="200" width="180" height="100" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="620" y="220" text-anchor="middle" class="table-name">twin_attribute</text>
  <line x1="540" y1="230" x2="700" y2="230" stroke="#D85A30" stroke-width="0.5"/>
  <text x="545" y="248" class="field">twin_id: FK</text>
  <text x="545" y="263" class="field">attr_key: VARCHAR</text>
  <text x="545" y="278" class="field">attr_value: JSONB</text>
  <text x="545" y="293" class="field">updated_at: TIMESTAMP</text>
  
  <!-- 连线到顶部 -->
  <line x1="255" y1="130" x2="185" y2="200" stroke="#888" stroke-width="1"/>
  <line x1="375" y1="175" x2="375" y2="200" stroke="#888" stroke-width="1"/>
  <line x1="495" y1="130" x2="565" y2="200" stroke="#888" stroke-width="1"/>
  
  <!-- twin_relation -->
  <rect x="40" y="330" width="180" height="100" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="130" y="350" text-anchor="middle" class="table-name">twin_relation</text>
  <line x1="50" y1="360" x2="210" y2="360" stroke="#BA7517" stroke-width="0.5"/>
  <text x="55" y="378" class="field">from_twin_id: FK</text>
  <text x="55" y="393" class="field">to_twin_id: FK</text>
  <text x="55" y="408" class="field">relation_type: ENUM</text>
  <text x="55" y="423" class="field">properties: JSONB</text>
  
  <!-- twin_location -->
  <rect x="285" y="330" width="180" height="100" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="375" y="350" text-anchor="middle" class="table-name">twin_location</text>
  <line x1="295" y1="360" x2="455" y2="360" stroke="#639922" stroke-width="0.5"/>
  <text x="300" y="378" class="field">twin_id: FK</text>
  <text x="300" y="393" class="field">position: GEOMETRY</text>
  <text x="300" y="408" class="field">coordinate_system</text>
  <text x="300" y="423" class="field">floor, zone: VARCHAR</text>
  
  <!-- twin_visual -->
  <rect x="530" y="330" width="180" height="100" rx="6" fill="#FBEAF0" stroke="#D4537E" stroke-width="1"/>
  <text x="620" y="350" text-anchor="middle" class="table-name">twin_visual</text>
  <line x1="540" y1="360" x2="700" y2="360" stroke="#D4537E" stroke-width="0.5"/>
  <text x="545" y="378" class="field">twin_id: FK</text>
  <text x="545" y="393" class="field">visual_element_id: FK</text>
  <text x="545" y="408" class="field">lod_level: INT</text>
  <text x="545" y="423" class="field">state_style: JSONB</text>
  
  <!-- 连线到中部 -->
  <line x1="130" y1="300" x2="130" y2="330" stroke="#888" stroke-width="1"/>
  <line x1="375" y1="300" x2="375" y2="330" stroke="#888" stroke-width="1"/>
  <line x1="620" y1="300" x2="620" y2="330" stroke="#888" stroke-width="1"/>
  
  <!-- twin_version -->
  <rect x="160" y="460" width="180" height="80" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1"/>
  <text x="250" y="480" text-anchor="middle" class="table-name">twin_version</text>
  <line x1="170" y1="490" x2="330" y2="490" stroke="#888" stroke-width="0.5"/>
  <text x="175" y="508" class="field">twin_id, version_no</text>
  <text x="175" y="523" class="field">snapshot: JSONB</text>
  <text x="175" y="538" class="field">created_at: TIMESTAMP</text>
  
  <!-- twin_audit -->
  <rect x="410" y="460" width="180" height="80" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1"/>
  <text x="500" y="480" text-anchor="middle" class="table-name">twin_audit</text>
  <line x1="420" y1="490" x2="580" y2="490" stroke="#888" stroke-width="0.5"/>
  <text x="425" y="508" class="field">twin_id, operation</text>
  <text x="425" y="523" class="field">operator, timestamp</text>
  <text x="425" y="538" class="field">old_value, new_value</text>
  
  <!-- 连线到底部 -->
  <line x1="250" y1="430" x2="250" y2="460" stroke="#888" stroke-width="1"/>
  <line x1="500" y1="430" x2="500" y2="460" stroke="#888" stroke-width="1"/>
</svg>
