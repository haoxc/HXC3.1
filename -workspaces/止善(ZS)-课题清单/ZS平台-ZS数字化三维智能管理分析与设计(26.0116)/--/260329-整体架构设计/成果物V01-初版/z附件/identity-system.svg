<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <style>
    .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #333; }
    .box-desc { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
  </style>
  
  <text x="360" y="28" text-anchor="middle" class="title">标识体系架构（多标准兼容）</text>
  
  <!-- 孪生体实体 -->
  <rect x="280" y="50" width="160" height="60" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="360" y="75" text-anchor="middle" class="box-title">孪生体实体</text>
  <text x="360" y="95" text-anchor="middle" class="box-desc">twin_entity_id (UUID)</text>
  
  <!-- 连线 -->
  <line x1="280" y1="80" x2="160" y2="150" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="360" y1="110" x2="360" y2="150" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="440" y1="80" x2="560" y2="150" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- KKS编码 -->
  <rect x="50" y="155" width="200" height="85" rx="8" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="150" y="180" text-anchor="middle" class="box-title">KKS编码（主标识）</text>
  <text x="150" y="200" text-anchor="middle" class="box-desc">电力行业标准</text>
  <text x="150" y="218" text-anchor="middle" class="box-desc">示例: MAA10CT001</text>
  <text x="150" y="233" text-anchor="middle" class="box-desc" fill="#2E75B6">+ IEC 61850支持</text>
  
  <!-- CIM/BIM编码 -->
  <rect x="270" y="155" width="180" height="85" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="360" y="180" text-anchor="middle" class="box-title">CIM/BIM编码</text>
  <text x="360" y="200" text-anchor="middle" class="box-desc">建筑/基础设施</text>
  <text x="360" y="218" text-anchor="middle" class="box-desc">IFC GUID</text>
  
  <!-- 自定义编码 -->
  <rect x="470" y="155" width="200" height="85" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="570" y="180" text-anchor="middle" class="box-title">自定义编码</text>
  <text x="570" y="200" text-anchor="middle" class="box-desc">企业内部标准</text>
  <text x="570" y="218" text-anchor="middle" class="box-desc">AREA-FLOOR-DEV</text>
  
  <!-- 标签系统 -->
  <text x="50" y="275" class="subtitle">标签系统 (Tags)</text>
  
  <rect x="50" y="285" width="150" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="125" y="308" text-anchor="middle" class="box-title">位置标签</text>
  <text x="125" y="325" text-anchor="middle" class="box-desc">坐标/楼层/区域</text>
  
  <rect x="220" y="285" width="150" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="295" y="308" text-anchor="middle" class="box-title">类型标签</text>
  <text x="295" y="325" text-anchor="middle" class="box-desc">设备/设施/传感器</text>
  
  <rect x="390" y="285" width="150" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="465" y="308" text-anchor="middle" class="box-title">业务标签</text>
  <text x="465" y="325" text-anchor="middle" class="box-desc">责任人/合同/项目</text>
  
  <rect x="560" y="285" width="140" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="630" y="308" text-anchor="middle" class="box-title">状态标签</text>
  <text x="630" y="325" text-anchor="middle" class="box-desc">在线/告警/维护</text>
  
  <!-- 数据模型 -->
  <text x="50" y="375" class="subtitle">标识数据模型</text>
  <rect x="50" y="385" width="620" height="28" rx="4" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="360" y="404" text-anchor="middle" class="box-desc">identity_id | twin_id | code_system (KKS/IEC61850/CIM/CUSTOM) | code_value | is_primary | valid_from | valid_to</text>
</svg>
