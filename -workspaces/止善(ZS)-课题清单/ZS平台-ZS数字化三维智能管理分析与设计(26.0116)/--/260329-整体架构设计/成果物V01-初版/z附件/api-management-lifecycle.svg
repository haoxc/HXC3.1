<svg width="750" height="320" viewBox="0 0 750 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <style>
    .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #333; }
    .box-desc { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
  </style>
  
  <text x="375" y="28" text-anchor="middle" class="title">接口全生命周期管理</text>
  
  <!-- 接口注册 -->
  <rect x="40" y="50" width="140" height="75" rx="8" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1"/>
  <text x="110" y="78" text-anchor="middle" class="box-title">接口注册</text>
  <text x="110" y="98" text-anchor="middle" class="box-desc">OpenAPI导入</text>
  <text x="110" y="114" text-anchor="middle" class="box-desc">手动配置</text>
  
  <line x1="180" y1="88" x2="210" y2="88" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 分类标签 -->
  <rect x="215" y="50" width="140" height="75" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="285" y="78" text-anchor="middle" class="box-title">分类标签</text>
  <text x="285" y="98" text-anchor="middle" class="box-desc">业务域/数据类型</text>
  <text x="285" y="114" text-anchor="middle" class="box-desc">孪生体类型</text>
  
  <line x1="355" y1="88" x2="385" y2="88" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 在线测试 -->
  <rect x="390" y="50" width="140" height="75" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="460" y="78" text-anchor="middle" class="box-title">在线测试</text>
  <text x="460" y="98" text-anchor="middle" class="box-desc">参数配置</text>
  <text x="460" y="114" text-anchor="middle" class="box-desc">Mock数据</text>
  
  <line x1="530" y1="88" x2="560" y2="88" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 发布上线 -->
  <rect x="565" y="50" width="145" height="75" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="638" y="78" text-anchor="middle" class="box-title">发布上线</text>
  <text x="638" y="98" text-anchor="middle" class="box-desc">版本管理</text>
  <text x="638" y="114" text-anchor="middle" class="box-desc">灰度/回滚</text>
  
  <!-- 运行时能力 -->
  <text x="40" y="160" class="subtitle">运行时能力</text>
  
  <rect x="40" y="170" width="160" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="120" y="193" text-anchor="middle" class="box-title">流量监控</text>
  <text x="120" y="210" text-anchor="middle" class="box-desc">QPS/延迟/错误率</text>
  
  <rect x="220" y="170" width="160" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="300" y="193" text-anchor="middle" class="box-title">链路追踪</text>
  <text x="300" y="210" text-anchor="middle" class="box-desc">请求ID/调用链</text>
  
  <rect x="400" y="170" width="150" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="475" y="193" text-anchor="middle" class="box-title">联调沙箱</text>
  <text x="475" y="210" text-anchor="middle" class="box-desc">多环境隔离</text>
  
  <rect x="570" y="170" width="140" height="55" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="640" y="193" text-anchor="middle" class="box-title">熔断限流</text>
  <text x="640" y="210" text-anchor="middle" class="box-desc">保护策略</text>
  
  <!-- 元数据模型 -->
  <text x="40" y="260" class="subtitle">接口元数据模型</text>
  <rect x="40" y="270" width="670" height="40" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="375" y="295" text-anchor="middle" class="box-desc">api_id | name | url | method | version | status | category | twin_type | request_schema | response_schema | auth_type | timeout</text>
</svg>
